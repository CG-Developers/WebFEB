<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="root-path" content="">
    <meta name="description" content="Galería de fotos y vídeos — Flamenco & Events Barcelona.">
    <title>Galería — Flamenco & Events Barcelona</title>
    <link rel="icon" href="assets/logo.jpg">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .gallery-masonry { columns: 3; gap: 4px; }
        .gallery-masonry .gitem { break-inside: avoid; margin-bottom: 4px; }
        .gitem { overflow: hidden; cursor: pointer; position: relative; }
        .gitem img { width: 100%; display: block; transition: transform 500ms cubic-bezier(.16,1,.3,1); }
        .gitem:hover img { transform: scale(1.04); }
        @media(max-width:768px) { .gallery-masonry { columns:2; } }
        @media(max-width:480px) { .gallery-masonry { columns:1; } }
        /* Lightbox */
        .lb { display:none; position:fixed; inset:0; z-index:999; background:rgba(10,10,10,.96); align-items:center; justify-content:center; }
        .lb.open { display:flex; }
        .lb img { max-width:90vw; max-height:90vh; object-fit:contain; }
        .lb-close { position:absolute; top:24px; right:28px; color:#F3EDE0; font-size:2rem; cursor:pointer; line-height:1; }
        .lb-prev, .lb-next { position:absolute; top:50%; transform:translateY(-50%); color:#F3EDE0; font-size:2rem; cursor:pointer; padding:16px; opacity:.7; }
        .lb-prev { left:16px; } .lb-next { right:16px; }
        .lb-prev:hover, .lb-next:hover { opacity:1; }
        /* Videos */
        .video-card video { width:100%; height:100%; object-fit:contain; display:block; border-radius:4px; }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <!-- Hero mini -->
    <section class="hero hero-inner" style="min-height:40vh">
        <div class="hero-bg"></div>
        <div class="hero-overlay" style="background:rgba(10,10,10,.7)"></div>
        <div class="hero-pattern"></div>
        <div class="hero-body" style="padding-bottom:48px">
            <div class="breadcrumb"><a href="index.html">Inicio</a><span>›</span>Galería</div>
            <div class="hero-eyebrow">Fotos &amp; Vídeos</div>
            <h1 class="hero-title" style="font-size:clamp(2.5rem,6vw,4.5rem)">Galería</h1>
        </div>
    </section>

    <!-- Fotos -->
    <section class="section section--white">
        <div class="section-inner">
            <div class="section-label">Fotografía</div>
            <h2 class="section-title" style="margin-bottom:28px">Momentos en escena</h2>
            <div class="gallery-masonry" id="gallery">
                <div class="gitem" data-idx="0"><div class="photo-slot" style="aspect-ratio:4/3"><img src="assets/photos/galeria-01.jpg" alt="Flamenco Barcelona 1" loading="lazy"></div></div>
                <div class="gitem" data-idx="1"><div class="photo-slot" style="aspect-ratio:3/4"><img src="assets/photos/galeria-02.jpg" alt="Flamenco Barcelona 2" loading="lazy"></div></div>
                <div class="gitem" data-idx="2"><div class="photo-slot" style="aspect-ratio:4/3"><img src="assets/photos/galeria-03.jpg" alt="Flamenco Barcelona 3" loading="lazy"></div></div>
                <div class="gitem" data-idx="3"><div class="photo-slot" style="aspect-ratio:3/4"><img src="assets/photos/galeria-04.jpg" alt="Flamenco Barcelona 4" loading="lazy"></div></div>
                <div class="gitem" data-idx="4"><div class="photo-slot" style="aspect-ratio:4/3"><img src="assets/photos/galeria-05.jpg" alt="Flamenco Barcelona 5" loading="lazy"></div></div>
                <div class="gitem" data-idx="5"><div class="photo-slot" style="aspect-ratio:4/3"><img src="assets/photos/galeria-06.jpg" alt="Flamenco Barcelona 6" loading="lazy"></div></div>
                <div class="gitem" data-idx="6"><div class="photo-slot" style="aspect-ratio:3/4"><img src="assets/photos/galeria-07.jpg" alt="Flamenco Barcelona 7" loading="lazy"></div></div>
                <div class="gitem" data-idx="7"><div class="photo-slot" style="aspect-ratio:4/3"><img src="assets/photos/galeria-08.jpg" alt="Flamenco Barcelona 8" loading="lazy"></div></div>
                <div class="gitem" data-idx="8"><div class="photo-slot" style="aspect-ratio:4/3"><img src="assets/photos/galeria-09.jpg" alt="Flamenco Barcelona 9" loading="lazy"></div></div>
                <div class="gitem" data-idx="9"><div class="photo-slot" style="aspect-ratio:3/4"><img src="assets/photos/galeria-10.jpg" alt="Flamenco Barcelona 10" loading="lazy"></div></div>
                <div class="gitem" data-idx="10"><div class="photo-slot" style="aspect-ratio:4/3"><img src="assets/photos/galeria-11.jpg" alt="Flamenco Barcelona 11" loading="lazy"></div></div>
                <div class="gitem" data-idx="11"><div class="photo-slot" style="aspect-ratio:4/3"><img src="assets/photos/galeria-12.jpg" alt="Flamenco Barcelona 12" loading="lazy"></div></div>
            </div>
        </div>
    </section>

    <!-- Lightbox -->
    <div class="lb" id="lb">
        <span class="lb-close" id="lb-close">×</span>
        <span class="lb-prev" id="lb-prev">‹</span>
        <img id="lb-img" src="" alt="">
        <span class="lb-next" id="lb-next">›</span>
    </div>

    <!-- Vídeos -->
    <section class="section section--dark">
        <div class="section-inner">
            <div class="section-label">Vídeos</div>
            <h2 class="section-title">En vídeo</h2>
            <p class="section-subtitle">Fragmentos de nuestros espectáculos</p>
            <div class="grid-2" style="gap:24px;margin-top:0">
                <div class="video-card" style="aspect-ratio:16/9;background:#111;border-radius:4px;overflow:hidden">
                    <video controls playsinline preload="metadata" controlsList="nodownload" oncontextmenu="return false">
                        <source src="assets/videos/video_1284.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="video-card" style="aspect-ratio:16/9;background:#111;border-radius:4px;overflow:hidden">
                    <video controls playsinline preload="metadata" controlsList="nodownload" oncontextmenu="return false">
                        <source src="assets/videos/video_1295.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="js/main.js"></script>
    <script>
        // Simple lightbox
        const items = document.querySelectorAll('.gitem');
        const lb = document.getElementById('lb');
        const lbImg = document.getElementById('lb-img');
        let current = 0;
        const srcs = [...items].map(i => i.querySelector('img')?.src || '');
        items.forEach(item => {
            item.addEventListener('click', () => {
                current = parseInt(item.dataset.idx);
                lbImg.src = srcs[current];
                lb.classList.add('open');
            });
        });
        document.getElementById('lb-close').onclick = () => lb.classList.remove('open');
        document.getElementById('lb-prev').onclick = () => { current = (current - 1 + srcs.length) % srcs.length; lbImg.src = srcs[current]; };
        document.getElementById('lb-next').onclick = () => { current = (current + 1) % srcs.length; lbImg.src = srcs[current]; };
        lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
        document.addEventListener('keydown', e => {
            if (!lb.classList.contains('open')) return;
            if (e.key === 'Escape') lb.classList.remove('open');
            if (e.key === 'ArrowLeft') { current = (current-1+srcs.length)%srcs.length; lbImg.src=srcs[current]; }
            if (e.key === 'ArrowRight') { current = (current+1)%srcs.length; lbImg.src=srcs[current]; }
        });
    </script>
</body>
</html>
